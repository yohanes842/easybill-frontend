<div class="w-full px-3 mt-3">
  <div class="flex align-items-center gap-3">
    <button
      pButton
      class="p-button-sm p-button-raised p-button-rounded p-0 text-white"
      style="background: var(--custom-red-300); transform: scale(0.8)"
      type="button"
      icon="pi pi-chevron-left"
      iconPos="left"
      (click)="back()"
    ></button>
    <h2 class="font-italic">Select Users</h2>
  </div>

  <div class="mb-1 w-full">
    <label for="subOrderBy" class="font-bold">Person</label>
    <div class="flex justify-content-between align-items-center gap-2">
      <div class="w-full">
        <p-autoComplete
          [style]="{
            width: '100%',
            'margin-block': '0.5rem'
          }"
          [inputStyle]="{ width: '100%', 'padding-block': '0.5rem' }"
          name="subOrderBy"
          [(ngModel)]="username"
          [suggestions]="filteredUsernames"
          (completeMethod)="filterUsername($event.query)"
          placeholder="Username"
        ></p-autoComplete>
      </div>
      <button
        pButton
        class="p-button-sm py-2 text-white bg-primary h-fit"
        type="button"
        label="Add"
        (click)="addParticipant()"
      ></button>
      <button
        pButton
        class="p-button-sm py-2 text-white bg-primary h-fit"
        type="button"
        label="Save"
        (click)="showSaveOrderConfirmation()"
      ></button>
    </div>
  </div>

  <div class="flex gap-3 overflow-x-scroll py-2">
    <div
      *ngFor="let user of participants; let i = index"
      class="text-center relative"
    >
      <button
        type="button"
        class="border-circle absolute border-none"
        style="top: -10%; right: -10%; background: var(--custom-red-300)"
        (click)="removeParticipant(i)"
      >
        x
      </button>
      <button
        class="border-none p-0"
        style="background: none"
        (click)="selectParticipant(i)"
      >
        <p-avatar
          styleClass="p-mr-2 font-bold p-avatar-lg border-primary {{
            selectedParticipant == user ? 'border-3' : 'border-none'
          }}"
          [style]="{
            'background-color': 'var(--custom-orange-50)',
            color: 'black'
          }"
          shape="circle"
          size="large"
          >{{ user.username | uppercase | slice: 0:1 }}</p-avatar
        >
      </button>

      <h6 class="m-0" style="color: var(--custom-orange-100)">
        {{
          user.username.length > 10
            ? (user.username | slice: 0:10) + "..."
            : user.username
        }}
      </h6>
    </div>
  </div>

  <div
    *ngIf="currentOrder.order_list.length > 0"
    class="mt-2 flex flex-column gap-2"
  >
    <button
      pButton
      *ngFor="let subOrder of currentOrder.order_list; let i = index"
      [attr.data-index]="i"
      class="flex gap-1 align-items-center border-1 border-300 py-2 pl-2 w-full text-white"
      style="background: none"
      [class.border-top-1]="i > 0"
      [class.bg-gray-500]="
        selectedParticipant && isSelectedUserHasOrder(subOrder)
      "
      (click)="chooseSubOrder(i)"
    >
      <div class="p-2 text-pink-300 font-bold w-3rem text-center text-sm">
        {{ subOrder.qty }}x
      </div>
      <div class="flex align-items-center justify-content-between w-full">
        <div class="text-sm text-left">
          <p class="m-0" style="overflow-wrap: break-word">
            {{ subOrder.order_menu_desc }}
          </p>
          <p class="m-0" style="color: var(--custom-orange)">
            {{ subOrder.price * subOrder.qty | currency: "Rp " }}
          </p>
        </div>
        <p-avatarGroup>
          <p-avatar
            *ngFor="let user of subOrder.users"
            label="{{ user.username | uppercase | slice: 0:1 }}"
            shape="circle"
            styleClass="p-mr-2"
            [style]="{
              'background-color': 'var(--custom-cyan-100)',
              color: 'black',
              border: 'solid 2px var(--custom-orange-200)'
            }"
          ></p-avatar>
          <p-avatar
            *ngIf="subOrder.users.length > 3"
            label="+{{ users.length - 3 }}"
            shape="circle"
            styleClass="p-mr-2"
            [style]="{
              'background-color': 'var(--custom-orange-200)',
              color: 'white',
              border: 'solid 2px var(--custom-orange-100)'
            }"
          ></p-avatar>
        </p-avatarGroup>
      </div>
    </button>
  </div>
</div>
